name: Deploy Banking Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build Application
        run: mvn clean package -DskipTests

      - name: Rename JAR
        run: |
          mv target/*.jar target/banking-service.jar

      - name: Copy JAR to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "target/banking-service.jar"
          target: "/opt/showtech"

      - name: Restart Banking Service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            sudo mv /opt/showtech/target/banking-service.jar /opt/showtech/banking-service.jar
            sudo rm -rf /opt/showtech/target
            sudo systemctl restart banking-service
            sudo systemctl status banking-service --no-pager